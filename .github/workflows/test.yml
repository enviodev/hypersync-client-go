name: Tests
on: [push]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22.4"

      - name: Require API token
        env:
          ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}
        run: |
          if [ -z "$ENVIO_API_TOKEN" ]; then
            echo "::error::ENVIO_API_TOKEN secret is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run Tests
        env:
          ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}
        run: |
          go test ./... -v
